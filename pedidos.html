<style>
        .glass-panel {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .product-card:hover .product-glow {
            opacity: 1;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #080808;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF6B00;
        }
        .catalog-filter-chip {
            word-break: break-word;
            hyphens: auto;
        }

<body data-page="pedidos" class="bg-deep-black text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-vibrant-orange selection:text-deep-black">
<div id="site-nav"></div>
<!-- Main Content Area -->
<main class="flex-grow w-full max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop py-8 grid grid-cols-1 lg:grid-cols-12 gap-gutter">
<!-- Sidebar Filters -->
<aside class="hidden lg:block lg:col-span-3 sticky top-24 self-start space-y-4 min-w-0">
<!-- Search -->
<div class="relative">
<input data-catalog-search class="w-full bg-surface-gray border border-surface-variant rounded-lg py-2.5 pl-9 pr-3 text-on-surface text-sm focus:outline-none focus:border-vibrant-orange focus:ring-1 focus:ring-vibrant-orange transition-colors" placeholder="Buscar bebidas..." type="search">
<span class="material-symbols-outlined absolute left-2.5 top-2.5 text-on-surface-variant text-[20px]">search</span>
</div>
<!-- Categories -->
<div class="bg-surface-gray rounded-xl p-4 border border-surface-variant/50 min-w-0">
<h3 class="font-headline-md text-[15px] text-gold-accent mb-3">Categorias</h3>
<div id="catalog-filters" class="grid grid-cols-2 gap-1.5 w-full min-w-0">
<p class="col-span-2 text-on-surface-variant text-xs">Carregando…</p>
</div>
</div>
</aside>
<!-- Product Grid -->
<section class="col-span-1 lg:col-span-9">
<!-- Mobile: busca + categoria -->
<div class="lg:hidden space-y-3 mb-6 min-w-0">
<div class="relative">
<input data-catalog-search class="w-full bg-surface-gray border border-surface-variant rounded-lg py-2.5 pl-9 pr-3 text-on-surface text-sm focus:outline-none focus:border-vibrant-orange transition-colors" placeholder="Buscar..." type="search">
<span class="material-symbols-outlined absolute left-2.5 top-2.5 text-on-surface-variant text-[20px]">search</span>
</div>
<label class="block">
<span class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-wider mb-1">Categoria</span>
<select id="catalog-filters-mobile" class="w-full bg-surface-gray border border-surface-variant rounded-lg text-on-surface text-sm py-2.5 px-3 focus:outline-none focus:border-vibrant-orange focus:ring-1 focus:ring-vibrant-orange">
<option value="">Todas as categorias</option>
</select>
</label>
</div>
<!-- Header -->
<div class="flex justify-between items-end mb-8">
<div>
<h1 class="font-display-lg text-[32px] md:text-display-lg text-on-surface mb-2">Catálogo</h1>
<p id="catalog-stats" class="font-body-md text-body-md text-on-surface-variant">Carregando catálogo…</p>
</div>
<div class="hidden md:flex items-center gap-2">
<span class="font-body-md text-on-surface-variant text-sm">Ordenar por:</span>
<select id="catalog-sort" class="bg-deep-black border border-surface-variant rounded-md text-on-surface py-1 pl-2 pr-8 focus:ring-vibrant-orange focus:border-vibrant-orange text-sm">
<option value="name">Nome (A–Z)</option>
<option value="price-asc">Menor preço</option>
<option value="price-desc">Maior preço</option>
</select>
</div>
</div>
<!-- Grid -->
<div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
<p class="col-span-full text-on-surface-variant font-body-md py-8 text-center">Carregando produtos…</p>
</div>
</section>
</main>
<div id="site-footer"></div>
<script src="js/cart-store.js"></script>
<script src="js/cart-ui.js"></script>
<script src="js/layout.js"></script>
