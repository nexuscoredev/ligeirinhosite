<style>
        .glass-panel {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .product-card:hover .product-glow {
            opacity: 1;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #080808;
        }
        ::-webkit-scrollbar-thumb {
            background: #353534;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FFCC00;
        }
        .catalog-cat-panel {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 204, 0, 0.35) transparent;
        }
        .catalog-cat-scroll {
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }
        .catalog-cat-btn {
            min-height: 2.5rem;
        }
        .catalog-cat-btn[aria-pressed='true'] {
            background: rgba(255, 204, 0, 0.12);
            border-color: rgba(255, 204, 0, 0.45);
            color: #FFE082;
        }
        .catalog-add-btn--success {
            background: #00e676 !important;
            color: #080808 !important;
            transform: scale(1.05);
        }
        @media (prefers-reduced-motion: reduce) {
            .catalog-cat-btn {
                transition: none;
            }
        }

<body data-page="pedidos" class="font-body-md antialiased min-h-screen flex flex-col">
<div id="site-nav"></div>
<main id="lig-page-main" class="flex-grow w-full max-w-container-max mx-auto pb-4">
<div class="sticky top-[var(--ze-header-offset,7.5rem)] z-20 ze-catalog-sticky">
<div class="flex items-center justify-between gap-3 px-4 py-2.5">
<h1 class="font-headline-md text-base font-bold text-[#1a1a1a]">Categorias</h1>
<p id="catalog-stats" class="text-xs text-[#999] shrink-0">Carregando…</p>
</div>
<nav id="catalog-filters-mobile" class="ze-filter-pills" aria-label="Filtrar por categoria">
<p class="text-xs text-[#999] px-4 py-2" role="status">Carregando…</p>
</nav>
<div class="hidden md:flex items-center gap-2 px-4 pb-2.5">
<label class="sr-only" for="catalog-sort-desktop">Ordenar</label>
<select id="catalog-sort-desktop" data-catalog-sort class="bg-surface-gray border border-surface-variant/40 rounded-lg text-on-surface text-sm py-2 px-3 focus:border-vibrant-yellow focus:outline-none">
<option value="name">Nome (A–Z)</option>
<option value="price-asc">Menor preço</option>
<option value="price-desc">Maior preço</option>
</select>
</div>
</div>
<div class="grid grid-cols-1 lg:grid-cols-12 gap-4 px-4 md:px-margin-desktop pt-3">
<aside class="hidden lg:block lg:col-span-3">
<nav id="catalog-filters" class="ze-filter-pills flex-col !overflow-visible flex-wrap gap-1.5 !px-0 sticky top-32" aria-label="Categorias">
<p class="text-xs text-on-surface-variant py-2" role="status">Carregando…</p>
</nav>
</aside>
<section class="lg:col-span-9">
<div id="catalog-grid" class="ze-product-grid">
<p class="col-span-full text-center text-[#999] py-8 text-sm">Carregando produtos…</p>
</div>
</section>
</div>
</main>
<div id="site-footer" class="hidden md:block"></div>
