<style>
        .glass-panel {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .product-card:hover .product-glow {
            opacity: 1;
        }
        .catalog-cat-btn {
            min-height: 2.5rem;
        }
        .catalog-cat-btn[aria-pressed='true'] {
            background: rgba(247, 213, 60, 0.12);
            border-color: rgba(247, 213, 60, 0.45);
            color: #FFE082;
        }
        .catalog-add-btn--success {
            background: #00e676 !important;
            color: #080808 !important;
            transform: scale(1.05);
        }
        @media (prefers-reduced-motion: reduce) {
            .catalog-cat-btn {
                transition: none;
            }
        }

<body data-page="pedidos" class="font-body-md antialiased min-h-screen flex flex-col">
<div id="site-nav"></div>
<main id="lig-page-main" class="flex-grow w-full max-w-container-max mx-auto pb-4 ze-catalog-page">
<div class="ze-catalog-sticky">
<div class="ze-catalog-sticky__head">
<div class="ze-catalog-sticky__titles">
<p class="ze-catalog-sticky__eyebrow" id="catalog-category-eyebrow">Escolha seus produtos</p>
<h1 class="ze-catalog-sticky__title" id="catalog-category-title">Catálogo</h1>
</div>
<p id="catalog-stats" class="ze-catalog-sticky__stats">Carregando…</p>
</div>
<div class="ze-catalog-toolbar">
<button type="button" class="ze-catalog-categories-btn lg:hidden" id="catalog-categories-open" aria-haspopup="dialog" aria-controls="catalog-categories-modal">
<span class="ze-catalog-categories-btn__icon" aria-hidden="true"><span class="material-symbols-outlined">category</span></span>
<span class="ze-catalog-categories-btn__label" id="catalog-categories-btn-label">Categorias</span>
<span class="material-symbols-outlined ze-catalog-categories-btn__chevron" aria-hidden="true">expand_more</span>
</button>
<div class="ze-catalog-toolbar__sort">
<label class="sr-only" for="catalog-sort">Ordenar</label>
<select id="catalog-sort" data-catalog-sort class="ze-catalog-sort">
<option value="name">Nome (A–Z)</option>
<option value="price-asc">Menor preço</option>
<option value="price-desc">Maior preço</option>
</select>
</div>
</div>
</div>
<div class="ze-catalog-layout px-4 md:px-margin-desktop">
<aside class="ze-catalog-sidebar hidden lg:block" aria-label="Categorias">
<p class="ze-catalog-sidebar__label">Categorias</p>
<nav id="catalog-filters" class="ze-catalog-sidebar__nav" aria-label="Categorias">
<p class="text-xs text-on-surface-variant py-2" role="status">Carregando…</p>
</nav>
</aside>
<section class="ze-catalog-main">
<div id="catalog-grid" class="totem-grid totem-grid--grid-m parceiros-catalog-grid" role="list">
<p class="parceiros-catalog-empty" role="status">Carregando produtos…</p>
</div>
</section>
</div>
</main>
<div id="catalog-categories-modal" class="ze-catalog-categories-modal" aria-hidden="true">
<button type="button" class="ze-catalog-categories-modal__backdrop" id="catalog-categories-backdrop" aria-label="Fechar categorias"></button>
<div class="ze-catalog-categories-modal__sheet" role="dialog" aria-modal="true" aria-labelledby="catalog-categories-modal-title">
<header class="ze-catalog-categories-modal__head">
<div>
<h2 class="ze-catalog-categories-modal__title" id="catalog-categories-modal-title">Categorias</h2>
<p class="ze-catalog-categories-modal__stats" id="catalog-categories-modal-stats"></p>
</div>
<button type="button" class="ze-catalog-categories-modal__close" id="catalog-categories-close" aria-label="Fechar">
<span class="material-symbols-outlined" aria-hidden="true">close</span>
</button>
</header>
<nav id="catalog-filters-mobile" class="ze-catalog-categories-modal__pills" aria-label="Categorias">
<p class="text-xs text-[var(--lig-text-subtle)] py-2" role="status">Carregando…</p>
</nav>
</div>
</div>
<div id="site-footer" class="hidden md:block"></div>
