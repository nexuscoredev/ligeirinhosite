<!DOCTYPE html><html lang="pt-BR"><head>

<meta charset="utf-8">

<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">

<title>Entrar - Ligeirinho Parceiros</title>

<link rel="icon" href="img/app-icon-192.png" type="image/png">

<link rel="apple-touch-icon" href="img/app-icon-512.png">

<link rel="manifest" href="manifest.webmanifest">

<meta name="theme-color" content="#ffffff">

<meta name="apple-mobile-web-app-title" content="Parceiros">

<script src="js/theme.js"></script>

<link rel="stylesheet" href="css/site.css">

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

<script id="tailwind-config">

        tailwind.config = {

            theme: {

                extend: {

                    colors: {

                        "vibrant-yellow": "#F7D53C",
                        "vibrant-orange": "#F7D53C",

                        "deep-black": "#1a1a1a"

                    },

                    fontFamily: {

                        "body-md": ["Inter"],

                        "headline-md": ["Hanken Grotesk"]

                    }

                }

            }

        }

    </script>

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>

<body data-page="login" class="lig-login-page font-body-md antialiased">

<div data-lig-theme-mount class="lig-login-theme" role="group" aria-label="Tema do app"></div>

<main class="lig-login-main">

<div class="lig-login-hero">

<div class="lig-login-logo-wrap">

<img class="lig-login-logo" src="img/ligeirinhologo.png" alt="Ligeirinho" width="220" height="220" decoding="async">

<span class="lig-login-wordmark"><span class="lig-brand__text">Ligeirinho</span><span class="lig-brand__app">Parceiros</span></span>

</div>

<h1 class="lig-login-title">Entrar ou cadastrar</h1>

</div>

<div class="lig-login-actions">

<div class="lig-login-oauth-row" role="group" aria-label="Entrar com Google ou telefone">
<button type="button" id="login-google-btn" class="lig-login-oauth-icon lig-login-google-btn" aria-label="Continuar com Google">
<svg class="lig-login-google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true" focusable="false">
<path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
<path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
<path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
<path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
</svg>
</button>
<button type="button" id="login-phone-toggle" class="lig-login-oauth-icon lig-login-phone-btn" aria-expanded="false" aria-controls="login-phone" aria-label="Entrar com telefone">
<span class="material-symbols-outlined lig-login-phone-btn__icon" aria-hidden="true">phone_iphone</span>
</button>
</div>

<div class="lig-login-divider" aria-hidden="true"><span>ou</span></div>

<section id="login-hub" class="lig-login-phone" aria-label="Entrar com usuário e senha">
<input id="login-hub-user" class="lig-login-setup__input" type="text" autocomplete="username" placeholder="Usuário" aria-label="Usuário">
<input id="login-hub-password" class="lig-login-setup__input" type="password" autocomplete="current-password" placeholder="Senha" aria-label="Senha">
<button type="button" id="login-hub-submit" class="lig-login-setup__save">Entrar</button>
</section>

<section id="login-phone" class="lig-login-phone lig-login-phone-panel" aria-labelledby="login-phone-title" hidden>
<h2 id="login-phone-title" class="lig-login-phone__title">Entrar com telefone</h2>
<p id="login-phone-hint" class="lig-login-phone__hint">Informe celular e nome. O nome é obrigatório para identificarmos você nos pedidos.</p>
<label class="lig-login-setup__label" for="login-phone-input">Celular (WhatsApp)</label>
<input id="login-phone-input" class="lig-login-setup__input" type="tel" inputmode="tel" autocomplete="tel-national" placeholder="(11) 97092-4909">
<label class="lig-login-setup__label" for="login-phone-name">Seu nome</label>
<input id="login-phone-name" class="lig-login-setup__input" type="text" autocomplete="name" placeholder="Nome e sobrenome" required minlength="2">
<button type="button" id="login-phone-submit" class="lig-login-setup__save">Entrar com telefone</button>
</section>

<p id="login-status" class="lig-login-status" hidden></p>

</div>

<p class="lig-login-legal">

Ao continuar, você concorda com nossos termos de uso e política de privacidade.

</p>

</main>

<script src="js/site-config.js"></script>
<script src="js/app.js"></script>

<script src="js/theme-ui.js"></script>

<script src="js/auth-store.js"></script>

<script src="js/auth-routing.js"></script>

<script src="js/auth-config-loader.js"></script>

<script src="js/phone-auth.js"></script>

<script src="js/layout.js"></script>

<script src="js/login-hub.js"></script>

<script src="js/login.js"></script>

<script src="js/login-phone.js"></script>

</body></html>
